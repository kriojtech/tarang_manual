<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Tarang Voice Assistant</title>

<link rel="stylesheet" href="style.css">

</head>

<body>



<div id="viewport">

    <div id="slider">

        <!-- PAGE 1 -->

        <section class="page">

            <div class="card">

                <h1 class="logo">TARANG</h1>

                <h2>Smart RF Tag</h2>

                <div class="welcome">

                    Welcome to Tarang Smart RF Tag

                </div>

                <div class="instruction">

                    Swipe Left or Right

                    <br><br>

                    to choose your language

                </div>

            </div>

        </section>

        <!-- PAGE 2 -->

        <section class="page">

            <div class="card">

                <h1 class="language">

                    English

                </h1>

                <div class="instruction">

                    Double Click Anywhere

                </div>

            </div>

        </section>

        <!-- PAGE 3 -->

        <section class="page">

            <div class="card">

                <h1 class="language">

                    हिन्दी

                </h1>

                <div class="instruction">

                    स्क्रीन पर दो बार क्लिक करें

                </div>

            </div>

        </section>

        <!-- PAGE 4 -->

        <section class="page">

            <div class="card">

                <h1 class="language">

                    ਪੰਜਾਬੀ

                </h1>

                <div class="instruction">

                    ਸਕ੍ਰੀਨ 'ਤੇ ਦੋ ਵਾਰ ਕਲਿੱਕ ਕਰੋ

                </div>

            </div>

        </section>

    </div>

</div>

<div class="dots">

    <span class="active"></span>
    <span></span>
    <span></span>
    <span></span>

</div>
<!-- ================= MANUAL PAGE ================= -->

<div id="manualPage" style="display:none;">

    <div class="card">

        <h1 id="manualTitle">
            Manual
        </h1>

        <div id="manualText">

        </div>

        <br><br>

        <button id="replayBtn">
            🔊 Replay
        </button>

        &nbsp;&nbsp;

        <button id="backBtn">
            ← Back
        </button>

    </div>

</div>
<script src="manuals.js"></script>
<script src="script.js"></script>


</body>

</html>
